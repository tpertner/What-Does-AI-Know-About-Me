<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" role="img" aria-label="What Does AI Know About Me? — A toolkit for AI data transparency">
  <defs>
    <!-- Pertner Logic gradient: teal-deep → teal → orange -->
    <linearGradient id="heroGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d4f5c"/>
      <stop offset="35%" stop-color="#1a8a9e"/>
      <stop offset="100%" stop-color="#ef8b4a"/>
    </linearGradient>
    <!-- Subtle radial highlights matching the site's ::before overlay -->
    <radialGradient id="highlight1" cx="20%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.08"/>
      <stop offset="60%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="highlight2" cx="80%" cy="80%" r="50%">
      <stop offset="0%" stop-color="#ef8b4a" stop-opacity="0.35"/>
      <stop offset="70%" stop-color="#ef8b4a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="highlight3" cx="10%" cy="90%" r="55%">
      <stop offset="0%" stop-color="#0d4f5c" stop-opacity="0.4"/>
      <stop offset="70%" stop-color="#0d4f5c" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background gradient -->
  <rect width="1200" height="400" fill="url(#heroGrad)"/>
  <rect width="1200" height="400" fill="url(#highlight1)"/>
  <rect width="1200" height="400" fill="url(#highlight2)"/>
  <rect width="1200" height="400" fill="url(#highlight3)"/>

  <!-- Accent line (matches site's design motif) -->
  <rect x="80" y="110" width="60" height="3" fill="#ffffff" fill-opacity="0.9"/>

  <!-- Eyebrow / kicker -->
  <text x="80" y="150" fill="#ffffff" fill-opacity="0.85" font-family="'Montserrat', 'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="500" letter-spacing="4">A PRACTICE, NOT A PRODUCT</text>

  <!-- Main title -->
  <text x="80" y="220" fill="#ffffff" font-family="Georgia, 'Times New Roman', serif" font-size="64" font-weight="700" letter-spacing="-1">What Does AI</text>
  <text x="80" y="290" fill="#ffffff" font-family="Georgia, 'Times New Roman', serif" font-size="64" font-weight="700" letter-spacing="-1">Know About Me?</text>

  <!-- Tagline -->
  <text x="80" y="335" fill="#ffffff" fill-opacity="0.92" font-family="'Montserrat', 'Helvetica Neue', Arial, sans-serif" font-size="15" font-weight="300" font-style="italic">Systems, Relationships, and the Space Between.</text>

  <!-- Footer meta -->
  <rect x="80" y="356" width="240" height="1" fill="#ffffff" fill-opacity="0.4"/>
  <text x="80" y="378" fill="#ffffff" fill-opacity="0.75" font-family="'Montserrat', 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="400" letter-spacing="2">PERTNER LOGIC  •  APRIL 2026</text>
</svg>
