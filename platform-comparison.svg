<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 720" role="img" aria-label="Platform Comparison: privacy impact across ChatGPT, Claude, Gemini, Perplexity, and Copilot">
  <defs>
    <filter id="cardShadowPC" x="-5%" y="-5%" width="110%" height="115%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="3" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.06"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Paper background -->
  <rect width="1100" height="720" fill="#fbf9f6"/>

  <!-- Top accent line -->
  <rect x="60" y="50" width="60" height="3" fill="#1a8a9e"/>

  <!-- Eyebrow -->
  <text x="60" y="82" fill="#1a8a9e" font-family="'Montserrat', 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="500" letter-spacing="3">PLATFORM COMPARISON</text>

  <!-- Main title -->
  <text x="60" y="125" fill="#1a2329" font-family="Georgia, 'Times New Roman', serif" font-size="36" font-weight="700" letter-spacing="-0.5">How They Stack Up</text>

  <!-- Legend -->
  <g transform="translate(60, 150)">
    <text x="0" y="12" fill="#4a5660" font-family="'Montserrat', 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="400">Icons reflect user privacy impact:</text>
    <circle cx="235" cy="8" r="6" fill="#c62828"/>
    <text x="248" y="12" fill="#4a5660" font-family="'Montserrat', 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="500">Privacy concern</text>
    <circle cx="370" cy="8" r="6" fill="#c8850f"/>
    <text x="383" y="12" fill="#4a5660" font-family="'Montserrat', 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="500">Caution</text>
    <circle cx="455" cy="8" r="6" fill="#2e7d32"/>
    <text x="468" y="12" fill="#4a5660" font-family="'Montserrat', 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="500">Privacy-positive</text>
  </g>

  <!-- Table card -->
  <g transform="translate(60, 190)">
    <rect x="0" y="0" width="980" height="440" fill="#ffffff" stroke="#d8d4ce" stroke-width="1" filter="url(#cardShadowPC)"/>

    <!-- Header row background -->
    <rect x="0" y="0" width="980" height="50" fill="#0d4f5c"/>

    <!-- Header: first column label -->
    <text x="20" y="31" fill="#ffffff" fill-opacity="0.6" font-family="'Montserrat', 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="500" letter-spacing="2">CATEGORY</text>

    <!-- Header: platform columns (5 platforms, evenly distributed) -->
    <text x="340" y="31" text-anchor="middle" fill="#ffffff" font-family="'Montserrat', 'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="600">ChatGPT</text>
    <text x="468" y="31" text-anchor="middle" fill="#ffffff" font-family="'Montserrat', 'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="600">Claude</text>
    <text x="596" y="31" text-anchor="middle" fill="#ffffff" font-family="'Montserrat', 'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="600">Gemini</text>
    <text x="724" y="31" text-anchor="middle" fill="#ffffff" font-family="'Montserrat', 'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="600">Perplexity</text>
    <text x="866" y="31" text-anchor="middle" fill="#ffffff" font-family="'Montserrat', 'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="600">Copilot (M365)</text>

    <!-- ========== ROW 1: Conversation retention ========== -->
    <rect x="0" y="50" width="980" height="65" fill="#ffffff"/>
    <text x="20" y="82" fill="#1a2329" font-family="'Montserrat', 'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="600">Conversation retention</text>
    <text x="20" y="100" fill="#4a5660" font-family="'Montserrat', 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="300">How long chats are stored</text>

    <circle cx="340" cy="78" r="7" fill="#c62828"/>
    <text x="340" y="103" text-anchor="middle" fill="#4a5660" font-family="'Montserrat', 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="500">Indefinitely</text>
    <circle cx="468" cy="78" r="7" fill="#c8850f"/>
    <text x="468" y="103" text-anchor="middle" fill="#4a5660" font-family="'Montserrat', 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="500">Until deleted</text>
    <circle cx="596" cy="78" r="7" fill="#c8850f"/>
    <text x="596" y="103" text-anchor="middle" fill="#4a5660" font-family="'Montserrat', 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="500">18mo default</text>
    <circle cx="724" cy="78" r="7" fill="#c8850f"/>
    <text x="724" y="103" text-anchor="middle" fill="#4a5660" font-family="'Montserrat', 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="500">Until deleted</text>
    <circle cx="866" cy="78" r="7" fill="#c8850f"/>
    <text x="866" y="103" text-anchor="middle" fill="#4a5660" font-family="'Montserrat', 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="500">Purview-governed</text>

    <line x1="0" y1="115" x2="980" y2="115" stroke="#f0ece4" stroke-width="1"/>

    <!-- ========== ROW 2: Memory system ========== -->
    <rect x="0" y="115" width="980" height="65" fill="#fbf9f6"/>
    <text x="20" y="147" fill="#1a2329" font-family="'Montserrat', 'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="600">Memory system</text>
    <text x="20" y="165" fill="#4a5660" font-family="'Montserrat', 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="300">Tracks preferences across chats</text>

    <circle cx="340" cy="143" r="7" fill="#c62828"/>
    <text x="340" y="168" text-anchor="middle" fill="#4a5660" font-family="'Montserrat', 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="500">Saved + inferred</text>
    <circle cx="468" cy="143" r="7" fill="#c62828"/>
    <text x="468" y="168" text-anchor="middle" fill="#4a5660" font-family="'Montserrat', 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="500">Cross-conversation</text>
    <circle cx="596" cy="143" r="7" fill="#c8850f"/>
    <text x="596" y="168" text-anchor="middle" fill="#4a5660" font-family="'Montserrat', 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="500">Limited</text>
    <circle cx="724" cy="143" r="7" fill="#2e7d32"/>
    <text x="724" y="168" text-anchor="middle" fill="#4a5660" font-family="'Montserrat', 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="500">None</text>
    <circle cx="866" cy="143" r="7" fill="#c62828"/>
    <text x="866" y="168" text-anchor="middle" fill="#4a5660" font-family="'Montserrat', 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="500">Enhanced personal.</text>

    <line x1="0" y1="180" x2="980" y2="180" stroke="#f0ece4" stroke-width="1"/>

    <!-- ========== ROW 3: Trains on your data ========== -->
    <rect x="0" y="180" width="980" height="65" fill="#ffffff"/>
    <text x="20" y="212" fill="#1a2329" font-family="'Montserrat', 'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="600">Trains on your data</text>
    <text x="20" y="230" fill="#4a5660" font-family="'Montserrat', 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="300">Uses chats for model training</text>

    <circle cx="340" cy="208" r="7" fill="#c8850f"/>
    <text x="340" y="233" text-anchor="middle" fill="#4a5660" font-family="'Montserrat', 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="500">Opt-out required</text>
    <circle cx="468" cy="208" r="7" fill="#c8850f"/>
    <text x="468" y="233" text-anchor="middle" fill="#4a5660" font-family="'Montserrat', 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="500">Opt-out required</text>
    <circle cx="596" cy="208" r="7" fill="#c8850f"/>
    <text x="596" y="233" text-anchor="middle" fill="#4a5660" font-family="'Montserrat', 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="500">Opt-out required</text>
    <circle cx="724" cy="208" r="7" fill="#c8850f"/>
    <text x="724" y="233" text-anchor="middle" fill="#4a5660" font-family="'Montserrat', 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="500">Opt-out required</text>
    <circle cx="866" cy="208" r="7" fill="#2e7d32"/>
    <text x="866" y="233" text-anchor="middle" fill="#4a5660" font-family="'Montserrat', 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="500">No (enterprise)</text>

    <line x1="0" y1="245" x2="980" y2="245" stroke="#f0ece4" stroke-width="1"/>

    <!-- ========== ROW 4: Data export ========== -->
    <rect x="0" y="245" width="980" height="65" fill="#fbf9f6"/>
    <text x="20" y="277" fill="#1a2329" font-family="'Montserrat', 'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="600">Data export available</text>
    <text x="20" y="295" fill="#4a5660" font-family="'Montserrat', 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="300">Can you get your data out?</text>

    <circle cx="340" cy="273" r="7" fill="#2e7d32"/>
    <text x="340" y="298" text-anchor="middle" fill="#4a5660" font-family="'Montserrat', 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="500">Full export</text>
    <circle cx="468" cy="273" r="7" fill="#c8850f"/>
    <text x="468" y="298" text-anchor="middle" fill="#4a5660" font-family="'Montserrat', 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="500">Limited</text>
    <circle cx="596" cy="273" r="7" fill="#2e7d32"/>
    <text x="596" y="298" text-anchor="middle" fill="#4a5660" font-family="'Montserrat', 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="500">Full (Takeout)</text>
    <circle cx="724" cy="273" r="7" fill="#c8850f"/>
    <text x="724" y="298" text-anchor="middle" fill="#4a5660" font-family="'Montserrat', 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="500">Limited</text>
    <circle cx="866" cy="273" r="7" fill="#c8850f"/>
    <text x="866" y="298" text-anchor="middle" fill="#4a5660" font-family="'Montserrat', 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="500">Via admin</text>

    <line x1="0" y1="310" x2="980" y2="310" stroke="#f0ece4" stroke-width="1"/>

    <!-- ========== ROW 5: Human review ========== -->
    <rect x="0" y="310" width="980" height="65" fill="#ffffff"/>
    <text x="20" y="342" fill="#1a2329" font-family="'Montserrat', 'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="600">Human review of chats</text>
    <text x="20" y="360" fill="#4a5660" font-family="'Montserrat', 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="300">People may read your conversations</text>

    <circle cx="340" cy="338" r="7" fill="#c62828"/>
    <text x="340" y="363" text-anchor="middle" fill="#4a5660" font-family="'Montserrat', 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="500">Yes</text>
    <circle cx="468" cy="338" r="7" fill="#c62828"/>
    <text x="468" y="363" text-anchor="middle" fill="#4a5660" font-family="'Montserrat', 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="500">Yes</text>
    <circle cx="596" cy="338" r="7" fill="#c62828"/>
    <text x="596" y="363" text-anchor="middle" fill="#4a5660" font-family="'Montserrat', 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="500">Yes</text>
    <circle cx="724" cy="338" r="7" fill="#c62828"/>
    <text x="724" y="363" text-anchor="middle" fill="#4a5660" font-family="'Montserrat', 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="500">Yes</text>
    <circle cx="866" cy="338" r="7" fill="#c62828"/>
    <text x="866" y="363" text-anchor="middle" fill="#4a5660" font-family="'Montserrat', 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="500">Admins via Purview</text>

    <line x1="0" y1="375" x2="980" y2="375" stroke="#f0ece4" stroke-width="1"/>

    <!-- ========== ROW 6: Cross-service data ========== -->
    <rect x="0" y="375" width="980" height="65" fill="#fbf9f6"/>
    <text x="20" y="407" fill="#1a2329" font-family="'Montserrat', 'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="600">Cross-service data pull</text>
    <text x="20" y="425" fill="#4a5660" font-family="'Montserrat', 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="300">Reaches into other apps or services</text>

    <circle cx="340" cy="403" r="7" fill="#2e7d32"/>
    <text x="340" y="428" text-anchor="middle" fill="#4a5660" font-family="'Montserrat', 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="500">No</text>
    <circle cx="468" cy="403" r="7" fill="#2e7d32"/>
    <text x="468" y="428" text-anchor="middle" fill="#4a5660" font-family="'Montserrat', 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="500">No</text>
    <circle cx="596" cy="403" r="7" fill="#c62828"/>
    <text x="596" y="428" text-anchor="middle" fill="#4a5660" font-family="'Montserrat', 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="500">Google ecosystem</text>
    <circle cx="724" cy="403" r="7" fill="#2e7d32"/>
    <text x="724" y="428" text-anchor="middle" fill="#4a5660" font-family="'Montserrat', 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="500">No</text>
    <circle cx="866" cy="403" r="7" fill="#c62828"/>
    <text x="866" y="428" text-anchor="middle" fill="#4a5660" font-family="'Montserrat', 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="500">Microsoft Graph</text>
  </g>

  <!-- Footer note -->
  <text x="60" y="665" fill="#4a5660" font-family="'Montserrat', 'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="400" font-style="italic">The goal isn't to rank platforms — it's to surface specific risks you can address with the audit prompts.</text>
  <text x="60" y="690" fill="#1a8a9e" font-family="'Montserrat', 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="500" letter-spacing="1">LAST VERIFIED: APRIL 2026</text>
</svg>
