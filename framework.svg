<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" role="img" aria-label="The 3-Layer Audit Framework: Surface, Behavioral, and System">
  <defs>
    <!-- Accent gradient matching Pertner Logic -->
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0d4f5c"/>
      <stop offset="50%" stop-color="#1a8a9e"/>
      <stop offset="100%" stop-color="#ef8b4a"/>
    </linearGradient>
    <filter id="cardShadow" x="-5%" y="-5%" width="110%" height="115%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="4" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.08"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Paper background matching site paper-warm tone -->
  <rect width="900" height="560" fill="#f5f1ea"/>

  <!-- Top accent line -->
  <rect x="60" y="50" width="60" height="3" fill="#1a8a9e"/>

  <!-- Eyebrow -->
  <text x="60" y="82" fill="#1a8a9e" font-family="'Montserrat', 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="500" letter-spacing="3">THE FRAMEWORK</text>

  <!-- Main title -->
  <text x="60" y="125" fill="#1a2329" font-family="Georgia, 'Times New Roman', serif" font-size="36" font-weight="700" letter-spacing="-0.5">Three Layers of AI Data Exposure</text>

  <!-- ================= LAYER 1: SURFACE ================= -->
  <g transform="translate(60, 170)">
    <!-- Card -->
    <rect x="0" y="0" width="780" height="105" fill="#ffffff" stroke="#d8d4ce" stroke-width="1" filter="url(#cardShadow)"/>
    <!-- Left accent bar -->
    <rect x="0" y="0" width="5" height="105" fill="#1a8a9e"/>

    <!-- Icon: Magnifying glass (surface) -->
    <g transform="translate(35, 30)">
      <circle cx="22" cy="22" r="18" fill="none" stroke="#1a8a9e" stroke-width="4"/>
      <line x1="36" y1="36" x2="50" y2="50" stroke="#1a8a9e" stroke-width="4" stroke-linecap="round"/>
    </g>

    <!-- Number badge -->
    <text x="115" y="32" fill="#4a5660" font-family="'Montserrat', 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="500" letter-spacing="2">LAYER 01</text>

    <!-- Layer title -->
    <text x="115" y="58" fill="#1a2329" font-family="Georgia, 'Times New Roman', serif" font-size="22" font-weight="700">Surface Audit</text>

    <!-- Description -->
    <text x="115" y="83" fill="#4a5660" font-family="'Montserrat', 'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="400">What the AI will tell you — stored memories, explicit profile data, saved preferences.</text>
  </g>

  <!-- Connector between layers -->
  <line x1="90" y1="283" x2="90" y2="303" stroke="#d8d4ce" stroke-width="2" stroke-dasharray="3,3"/>

  <!-- ================= LAYER 2: BEHAVIORAL ================= -->
  <g transform="translate(60, 305)">
    <rect x="0" y="0" width="780" height="105" fill="#ffffff" stroke="#d8d4ce" stroke-width="1" filter="url(#cardShadow)"/>
    <rect x="0" y="0" width="5" height="105" fill="#0d4f5c"/>

    <!-- Icon: Brain / inference pattern -->
    <g transform="translate(35, 30)">
      <!-- Stylized brain/network icon -->
      <circle cx="22" cy="22" r="6" fill="#0d4f5c"/>
      <circle cx="8" cy="12" r="4" fill="#0d4f5c"/>
      <circle cx="36" cy="12" r="4" fill="#0d4f5c"/>
      <circle cx="8" cy="34" r="4" fill="#0d4f5c"/>
      <circle cx="36" cy="34" r="4" fill="#0d4f5c"/>
      <circle cx="22" cy="2" r="3" fill="#0d4f5c"/>
      <circle cx="22" cy="44" r="3" fill="#0d4f5c"/>
      <line x1="22" y1="22" x2="8" y2="12" stroke="#0d4f5c" stroke-width="1.5"/>
      <line x1="22" y1="22" x2="36" y2="12" stroke="#0d4f5c" stroke-width="1.5"/>
      <line x1="22" y1="22" x2="8" y2="34" stroke="#0d4f5c" stroke-width="1.5"/>
      <line x1="22" y1="22" x2="36" y2="34" stroke="#0d4f5c" stroke-width="1.5"/>
      <line x1="22" y1="22" x2="22" y2="2" stroke="#0d4f5c" stroke-width="1.5"/>
      <line x1="22" y1="22" x2="22" y2="44" stroke="#0d4f5c" stroke-width="1.5"/>
    </g>

    <text x="115" y="32" fill="#4a5660" font-family="'Montserrat', 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="500" letter-spacing="2">LAYER 02</text>
    <text x="115" y="58" fill="#1a2329" font-family="Georgia, 'Times New Roman', serif" font-size="22" font-weight="700">Behavioral Audit</text>
    <text x="115" y="83" fill="#4a5660" font-family="'Montserrat', 'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="400">What the AI has inferred — communication style, personality, psychological patterns.</text>
  </g>

  <line x1="90" y1="418" x2="90" y2="438" stroke="#d8d4ce" stroke-width="2" stroke-dasharray="3,3"/>

  <!-- ================= LAYER 3: SYSTEM ================= -->
  <g transform="translate(60, 440)">
    <rect x="0" y="0" width="780" height="105" fill="#ffffff" stroke="#d8d4ce" stroke-width="1" filter="url(#cardShadow)"/>
    <rect x="0" y="0" width="5" height="105" fill="#d9652a"/>

    <!-- Icon: Server/database stack -->
    <g transform="translate(35, 25)">
      <rect x="5" y="2" width="34" height="10" rx="2" fill="none" stroke="#d9652a" stroke-width="2.5"/>
      <rect x="5" y="18" width="34" height="10" rx="2" fill="none" stroke="#d9652a" stroke-width="2.5"/>
      <rect x="5" y="34" width="34" height="10" rx="2" fill="none" stroke="#d9652a" stroke-width="2.5"/>
      <circle cx="11" cy="7" r="1.5" fill="#d9652a"/>
      <circle cx="11" cy="23" r="1.5" fill="#d9652a"/>
      <circle cx="11" cy="39" r="1.5" fill="#d9652a"/>
    </g>

    <text x="115" y="32" fill="#4a5660" font-family="'Montserrat', 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="500" letter-spacing="2">LAYER 03</text>
    <text x="115" y="58" fill="#1a2329" font-family="Georgia, 'Times New Roman', serif" font-size="22" font-weight="700">System Audit</text>
    <text x="115" y="83" fill="#4a5660" font-family="'Montserrat', 'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="400">What's behind the scenes — logs, metadata, retention policies, training pipelines.</text>
  </g>
</svg>
